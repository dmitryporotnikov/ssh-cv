# SSH CV Viewer Configuration
#
# Copy this file to config.yaml and customize as needed.
# All settings are optional - defaults are used for any missing values.

server:
  port: 2222
  # Path to the SSH host key. The server creates this file on first start.
  host_key_path: "ssh_host_key"
  # Maximum time allowed to complete the SSH handshake.
  handshake_timeout_seconds: 10
  # Absolute lifetime for a connected session.
  session_timeout_seconds: 300
  # Upper bound for simultaneous accepted connections.
  max_concurrent_connections: 100

animations:
  matrix_lines:
    - "01001110 10101010 11110000 CONNECTION_DETECTED"
    - "10110101 01010101 00110011 SYSTEM_V.3.7.1"
    - "01101001 11010101 10101010 LINK_ESTABLISHED"
    - "11010010 01010101 11110000 ENCRYPTION_BYPASSED"
    - "00101010 11010101 00110011 ROOT_ACCESS_OBTAINED"

  matrix_speed_ms: 80

  scan_lines_count: 3

  scan_speed_ms: 5

  ascii_glitch: true

  boot_delay_ms: 60

  typewriter_speed_ms: 8

  show_scan_lines: true

messages:
  access_granted: ">> ACCESS GRANTED <<"

  press_to_exit: "[Press 'q' to disconnect]"

  goodbye: "Connection terminated."

  hack_message: "BYE!"
